front:
  text: 重刋道藏輯要
  hash: sha256:972c3c5029b24a17e27f2b03a7e86d4422a7e71d4455eb70dca445dd908b9848
body:
  text: 夷山李道謙編宋徽宗政和二年壬辰重陽祖師生於是年十二月二十二日按北平王粹所撰傳云全真祖師王嚞字知明號重陽子京兆咸陽人世以貲產著姓後遷終南縣劉蔣村其母感異夢而妊及二十有四月乃生始名中孚字允卿自稚不羣旣長美鬚眉軀榦雄偉志倜儻不拘小節弱冠修進士業系京兆學籍善於屬文才思敏捷嘗解試一路之士然頗喜弓馬金天眷初乃慨然應武略易名世雄字德威後入道改稱今名字焉仍以害風自呼之政和三年癸巳重陽祖師二歲政和四年甲午重陽祖師三歲政和五年乙未重陽祖師四歲政和六年丙申重陽祖師五歲政和七年丁酉重陽祖師六歲重和元年戊戌重陽祖師七歲宣和元年己亥重陽祖師八歲此年正月初五日清淨孫仙姑生於寍海州宣和二年庚子重陽祖師九歲宣和三年辛丑重陽祖師十歲宣和四年壬寅重陽祖師年十一宣和五年癸卯重陽祖師年十二是年三月初一日長真子譚真人生於寍海州始名玉字伯玉五月二十日丹陽馬真人生於寍海今之降仙坊按傳初名從義字宜甫本關中扶風人五代兵亂遷海上宣和六年甲辰重陽祖師年十三宣和七年乙巳重陽祖師年十四欽宗靖康元年丙午重陽祖師年十五金太宗天會五年丁未重陽祖師年十六天會六年戊申重陽祖師年十七其年譚真人六歲按密國公撰真人碑云六歲因戲墮於井人急下救之見公安坐水上隨挈而出天會七年己酉重陽祖師年十八天會八年庚戌重陽祖師年十九天會九年辛亥重陽祖師年二十天會十年壬子重陽祖師年二十一天會十一年癸丑重陽祖師年二十二天會十二年甲寅重陽祖師年二十三天會十三年乙卯重陽祖師年二十四天會十四年丙辰重陽祖師年二十五天會十五年丁巳重陽祖師年二十六此年長真真人年十五宻國公作真人碑云公十有五歲而志于學其葡萄篇已膾炙人口天眷元年戊午重陽祖師年二十七按傳天眷初應試武舉易名世雄字德威天眷二年己未重陽祖師年二十八天眷三年庚申重陽祖師年二十九正月初三日廣寍郝真人生於寍海州初名昇字則未聞也皇統元年辛酉重陽祖師年三十皇統二年壬戌重陽祖師年三十一其年三月十八日玉陽王真人生於寍海州皇統三年癸亥重陽祖師年三十二皇統四年甲子重陽祖師年三十三皇統五年乙丑重陽祖師年三十四皇統六年丙寅重陽祖師年三十五皇統七年丁卯重陽祖師年三十六七月十二日長生劉真人生於東萊之武官莊皇統八年戊辰重陽祖師年三十七是年正月十九日長春邱真人生於登州棲霞縣之濱都玉陽真人年七歲按真人雲光集自序云余七歲遇東華帝君於空中警覺不令昏昧海陵天德元年己巳重陽祖師年三十八天德二年庚午重陽祖師年三十九天德三年辛未重陽祖師年四十天德四年壬申重陽祖師年四十一貞元元年癸酉重陽祖師年四十二貞元二年甲戌重陽祖師年四十三貞元三年乙亥重陽祖師年四十四正隆元年丙子重陽祖師年四十五正隆二年丁丑重陽祖師年四十六正隆三年戊寅重陽祖師年四十七正隆四年己卯重陽祖師年四十八此年六月望日師飲酒於終南甘河鎮會二仙人被髮披氈而年貌同其一人徐曰此子可教因授以口訣故師遇真詩云四旬八上始遭逢口訣傳來便有功其所遇者純陽吕真君也正隆五年庚辰重陽祖師年四十九中秋日師於醴泉縣再遇真仙傳祕語五篇且曰速去東海投譚捉馬已而真仙忽失所在世宗大定元年辛巳重陽祖師年五十於終南南時村鑿壙丈餘封高數尺以活死人目之坐於墓中又於四隅各植海棠一株人問其故答曰吾將來使四海教風爲一家耳大定二年壬午重陽祖師年五十一是年坐活死人墓中大定三年癸未重陽祖師年五十二秋填活死人墓遷劉蔣村結茅與玉蟾和公靈陽李公三人同居即今之祖庭重陽萬壽宫也大定四年甲申重陽祖師年五十三師全真集自序云余嘗從甘河携酒一葫欲歸庵道逢一先生叫云害風肯與我酒喫否余與之先生一引而盡卻令余以葫取河水余取得水授與先生先生復授余令余飲之乃仙酎也又曰子識劉海蟾否余曰但嘗見畫像耳先生笑之而去大定五年乙酉重陽祖師年五十四是年於終南上清太平宫壁上書云害風害風舊病發壽命不過五十八兩箇先生決定來一靈真性成搜刷大定六年丙戌重陽祖師年五十五是歲於長安灤村吕道人庵壁書云地肺重陽子呼爲王害風來時長日月去後任西東作伴雲和水爲鄰虛與空一靈真性在不與眾心同此年長春真人年一十九棄俗入道居崑崙山大定七年丁亥重陽祖師年五十六於四月二十六日將劉蔣村茅庵自焚之婆娑舞於火邊人問答茅庵燒了事休休決有仁人卻要修是日宿甘河鎭辭眾曰余東海捉馬去五月過北邙山上清宫題其壁云丘譚王風捉馬劉崑崙頂上打玉毬你還般在寰海內贏得三千八百籌至今石刻猶在閏七月十八日抵寍海州會丹陽真人洎高巨才邀師於范明叔怡老亭九月長春真人自崑崙山來謁祖師於全真庵請爲弟子祖師訓名處機字通密號長春子仍贈之以詩祖師又於廣寍真人卦肆前背坐感發之廣寍從至朝元觀祖師授以口訣及以二詞付之祖師於十月一日就丹陽宅內鎖門居環百日爲期約五日一食化丹陽夫婦是冬長真真人就環內出家祖師訓名處端字通正號長真子時四十五歲矣大定八年戊子重陽祖師年五十七正月初十日出環分梨十化畢二月初八丹陽真人出家祖師訓名鈺字玄寶號丹陽子時年四十六是日玉陽真人自牛仙山來願爲門弟子祖師訓名處一時年二十七二月晦日祖師挈丹陽長真長春玉陽入崑崙山石門口開煙霞洞居之三月廣寍真人來崑嵛山出家祖師訓名璘號恬然子時二十九歲八月祖師挈五真人自煙霞洞遷居文登縣姜實庵立七寶會大定九年己丑重陽祖師年五十八春玉陽真人辭祖師隱居查山四月祖師引丹陽長真長春廣寍遷居寍海州金蓮堂途中至龍泉以所執傘柄內盛陽子號乘風而起至查山玉陽公前墮地蓋賜公之號也重午日孫仙姑詣金蓮堂出家祖師訓名不二號清淨散人時年五十一六月廣寍真人辭祖師亦居查山八月祖師立金蓮會九月詣登州福山縣立三光會於蓬萊立玉華會是月祖師領丹易長真長春西至萊州化長生真人出家訓名處玄字通妙號長生子時年二十三十月於掖縣立平等會是月挈四子至汴梁寓磁器王氏旅邸中大定十年庚寅重陽祖師於正月初四日召丹陽長真長春立於榻下時長生遁去曰丹陽已得道長真已知道吾無慮矣處機所學一聽丹陽處玄長真當管領之吾今赴師真之約耳丹陽請留頌師曰吾已書於長安灤村吕仙庵矣今口授汝言訖而逝是年閏五月於正月十一日始立春是止五十八歲矣四子盡禮權瘞于孟宗獻之花圃旣而丹陽真人率三友入關謁和李二真人于終南太平宫會史處厚于京兆劉通微嚴處常于終南二真人乃祖師之友三子亦祖師之弟子也大定十一年辛卯丹陽真人年四十九是年與三友居劉蔣祖庵修治葬所十月廣寍真人入關乞食于京兆府大定十二年壬辰丹陽真人年五十春於長安化自然錢率三友復往汴梁遷祖師仙柩西歸葬于劉蔣村祖庵九月廣寍真人西遊岐山偶得名大通字太古號廣寍子大定十三年癸巳丹陽真人年五十一是年四師劉蔣居喪守墳六月廣寍真人度大慶關東歸大定十四年甲午丹陽真人年五十二二月慶寍真人至真定默坐于朝天門外八月丹陽長真長生長春於鄠縣秦渡鎭真武廟月夜共坐各言其志丹陽闘貧長真闘是長生闘志長春闘閒翼旦乃别丹陽劉蔣居環長真居洛陽朝元宫長生居洛陽市土地廟長春西入磻溪事見金玉集大定十五年乙未丹陽真人年五十三是年長真真人乞食於磁州二祖鎮遇一妄人歐落二齒市人共怒之欲明於官真人吐之而去二月廣寍真人坐沃州石橋下夏清淨散人入關致祭祖庭旣而出關居洛陽風仙姑洞大定十六年丙申丹陽真人年五十四長真真人此歲游厯洺州居白家灘六月中廣寍真人夜夢神人復授易之大義旣寤明朝揮三十三圖事見太古集大定十七年丁酉丹陽真人五十五長真真人行化於高唐縣與茶肆吳六書龜蛇字曰可置之壁間以鎭火灾是年縣城大火唯茶肆乃免大定十八年戊戌丹陽真人年五十六於八月一日劉蔣出環西游隴山華亭行化長生真人是年遷洛城東北雲溪洞居之門徒日集鑿三井洞大定十九年己亥丹陽真人年五十七二月十五日於華亭縣挈李大乘同居環百日至八月遷隴州佑德觀居環十一月十八日出環宿勾兜堡化解元李子和出家長真真人游厯衛州獲嘉縣府君廟居之大定二十年庚子丹陽真人年五十八是年春京兆章臺街趙蓬萊施宅爲庵請真人居環八月二十四日長安僚庶請祈雨真人作詩期以二十五日雨足至期果應見金玉集長真真人西游同州居西里庵長春真人自磻溪遷居隴州龍門山大定二十一年辛丑丹陽真人年五十九四月初於鄠縣劉蔣村張朝散竹園庵內居環中元日作黃籙醮罷復歸祖庵長真真人居華陰縣純陽洞長生真人東歸萊州大定二十二年壬寅丹陽真人年六十此年四月東歸寍海十二月行化文登漁戸焚網者甚衆初八日海市見於南海之上士人以詩慶之長生真人居武官建庵註道德黃庭等經秋玉陽真人來寍海謁丹陽真人同宿於金蓮堂廣寍真人居真定府陞堂演道聽眾常數百人十二月二十九日清淨孫仙姑升仙于洛陽年六十四矣大定二十三年癸卯丹陽真人年六十一四月行化芝陽下元日文登作醮祖師現於空際白龜之上丹陽於十二月二十二日升仙於萊陽縣遊仙宫長生玉陽二真人同主葬事守墳百日各歸其隱所大定二十四年甲辰長真真人年六十二是年正月十八日長生真人於昌陽縣姜守淨家作醮巳午間重陽祖師雲冠絳服丹陽真人三髻現於空際綵雲之上五月旱登郡太守請長生真人祈雨海市現於竹島明日丹陽真人現於應仙橋之西北是日雨足大定二十五年乙巳長真真人年六十三是歲四月初一日升仙於洛陽朝元宫其暢道接物詩詞目曰水雲集行於世大定二十六年丙午長生真人年四十冬長春真人下龍門山居終南祖庵大定二十七年丁未長生真人年四十一是年十一月十三日玉陽真人奉詔至燕帝問延生之理師曰惜精全神修身之要端拱無爲治天下之本上待以方外之禮大定二十八年戊申長生真人年四十二此年二月長春真人奉詔至闕下十一日聖旨令主萬春節醮蒙賜巾袍四月勑居宫庵五月十八日召見於長松島七月應制進詞五首中秋得旨還終南山是月玉陽真人亦得旨還山十二月上弗豫遣使復召玉陽真人真人謂使者曰恐不及再睹天顏矣大定二十九年己酉長生真人年四十三正月初三日玉陽真人至都嗣君命真人爲先帝主醮而歸章宗明昌元年庚戌長生真人年四十四重午日萊陽縣劉植請玉陽真人齋且以無嗣告於師師曰公富而好禮未應絶也爲寫四四應真四字明年四月十四而生子來乞名師曰吾已與名應真矣今日純陽真君降世辰也明昌二年辛亥長生真人年四十五是歲十月長春真人東歸棲霞住太虛觀明昌三年壬子長生真人年四十六冬十月長春真人芝陽洞作醮明昌四年癸丑長生真人年四十七明昌五年甲寅長生真人年四十八秋九月長春真人福山縣醮天門開瑞鶴現有詩見磻溪集明昌六年乙卯長生真人年四十九承安元年丙辰長生真人年五十承安二年丁巳長生真人年五十一六月玉陽真人被召七月初三日見於便殿賜坐帝問以養生之道抵暮方歸翼日賜體玄大師號及紫衣勑賜燕都修真崇福二觀俾真人任便居之月給齋錢二百鏹冬長生真人奉召赴闕帝問以至道師曰至道之要寡嗜慾則身安薄賦斂則國泰帝曰先生廣成子之言乎勑近侍館穀於天長觀承安三年戊午長生真人年五十二應對悉合上意三月得旨還山勑賜觀額五道曰靈虛曰太微曰龍翔曰集仙曰妙真令立觀度人玉陽真人猶居都下春終南吕庵主至都師爲請祖庵爲靈虛觀以勑牒付吕俾知觀事仍以詩送行夏師得旨東歸侍親承安四年己未長生真人年五十三是年長春真人芝陽作醮承安五年庚申長生真人年五十四泰和元年辛酉長生真人年五十五是年遊廣陵著天道罪福論玉陽真人奉詔詣亳州太清宫作普天醮有詩見雲光集泰和二年壬戌長生真人年五十六濱州作醮有瓊葩玉樹之瑞有詩見盤陽集長春真人芝陽作醮泰和三年癸亥長生真人年五十七此年二月初六日升仙於武官靈虛觀玉陽真人奉詔詣亳州太清宫作普天醮臨壇度道士千餘人泰和四年甲子長春真人年五十七泰和五年乙丑長春真人年五十八夏五月萊州醮有瑞鶴綵雲現有詞見磻溪集泰和六年丙寅長春真人年五十九泰和七年丁卯長春真人年六十元妃施道經二藏一驛送棲霞太虛觀一驛送聖水玉虛觀泰和八年戊辰長春真人年六十一大安元年己巳長春真人年六十二是年游鼇山有詩二十首玉陽真人七月十四日至北京應孛木魯參政之請也居華陽觀是時大旱僚庶告真人雨期真人曰十七日霑足矣至日果應大元庚午長春真人年六十三夏玉陽真人薊州玉田縣醮畢謂衆曰北方道氣將回空中有神明往來刀劍擊觸之聲莫非生靈將受苦耶大元辛未長春真人年六十四是年東海召至燕都及游德興琅山俱有詩見鳴道集壬申長春真人年六十五是年十二月三十日廣寍真人升仙於寍海州先天觀春秋七十三矣癸酉長春真人年六十六甲戌長春真人年六十七此年游崑崙煙霞洞有詩乙亥長春真人年六十八丙子長春真人年六十九時居登州金主命東平監軍王庭玉賫詔召師歸汴京師曰我循天理而行天使行處無敢違也乃不起丁丑長春真人年七十玉陽真人四月二十三日升仙於聖水玉虛觀時七十六歲矣戊寅長春真人年七十一己卯長春真人年七十二居萊州昊天觀是時齊魯陷宋八月宋主遣使召師不起州牧謝曰師居此我輩誠有所依師曰吾之出處非若輩可知也他日恐不能留居此耳是年五月太祖聖武皇帝自奈蠻國遣近侍劉仲祿持詔召師十二月仲祿至萊州庚辰長春真人年七十三正月自萊州北行二月至燕都四月官僚請作醮於太極宫五月至德興府寓龍陽觀八月至宣德州寓朝元觀辛巳長春真人年七十四是年五月朔抵陸局河七月至阿不罕山留宋道安等九人立棲霞觀中秋日抵金山遇白骨甸十一月至邪迷思干城俱有詩見鳴道集壬午長春真人年七十五春三月過鐵門達於行在上設二帳於御幄之東以居之時問以至道師大略對以節欲保躬天道好生惡殺治尚無爲清靜之理上悅乃命左史書諸策其詳見慶會錄西游記癸未長春真人年七十六是歲三月七日得旨東還賜號神仙俾掌管天下道門大小事務一聽神仙處置他人無得干預宫觀差役盡行蠲免所在官司常切衛護六月抵豐州八月至宣德州甲申長春真人年七十七春二月居縉山秋陽觀三月燕京官僚請住太極宫是月仙仗入燕都乙酉長春真人年七十八秋九月熒惑犯尾宿主燕地灾宣撫王楫請師作醮禳之醮竟熒惑乃退數舍矣丙戌長春真人年七十九夏五月燕境大旱僚庶請師作醮雨隨時霑足在都名儒皆有詩賀之丁亥長春真人年八十夏大旱在京士庶禱師作醮師曰我方留意醮事公輩來請所謂好事不約而同也仍云當備二醮以五月初一日爲祈雨三日爲賀雨醮後皆如師言是月得旨改太極宫爲長春宫六月太液池涸北口山摧人告於師師笑曰山摧水枯吾將與之俱乎七月四日師謂門人曰昔丹陽嘗授記於予云吾殁之後教門大興四方往往化爲道鄕道院皆勑賜名額又當住持大宫觀仍有使者佩符乘傳幹教門事此汝功成名遂歸休之時也今丹陽師之言一一皆驗吾歸無憾焉九日登寶玄堂留頌而逝古人之有年譜尚矣所以著出處之實使後世得以考觀者焉我玄門之七真身雖游乎方外道實滿于人間當國朝革命之際其救世及物之功不爲不腆故封龍李翰長敬齋云七真之救世也真叶上帝之心也上帝之愛民也真藉七真之教也不然何爲天生聖皇出寍四海天生長春左右大命相與聚精會神同始共終哉觀此自可見矣僕因焚誦之暇不揆狂斐徧考師真文集及諸家所撰傳記起重陽祖師降世之歲訖長春真人升仙之秋一百一十六年之間出處事跡詳節編次通爲一譜其或一二傳記所載與各師真文集不相同者捨傳記而取文集也蓋文集紀錄之真傳記有所未詳也嗚呼七真始終之大槩具矣若夫師真之尸居而龍見雷聲而淵默神動而天隨從容無爲之妙固不得以盡筆舌形容之今之紀者但取其修真立教之迹姑此啟諸童蒙俾於向上諸師知所宗本非敢以瀆我同志者也至元辛未歲中元日天樂道人李道謙書於終南祖庭之筠溪道院
